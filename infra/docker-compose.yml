name: provenance

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: provenance-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-provenance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-provenance}
      POSTGRES_DB: ${POSTGRES_DB:-provenance}
    ports:
      # host port defaults to 5433 to avoid clashing with other local
      # Postgres instances; in-container it's always 5432
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
